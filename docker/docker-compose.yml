version: '3.8'

services:
  llm-spine-parse:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        JUPYTERHUB_VERSION: "4.0.2"
    
    image: llm-spine-parse:dev
    container_name: llm-spine-parse-dev
    
    # GPU support
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - GRANT_SUDO=yes
      - JUPYTER_ENABLE_LAB=yes
    
    # Mount project repository (includes code, data, images, checkpoints)
    volumes:
      - ..:/home/jovyan/llm_train:rw     # Project root
    
    # Ports
    ports:
      - "8888:8888"      # Jupyter Lab
      - "8000:8000"      # vLLM API (if running inference server)
    
    # Override CMD for local Jupyter Lab (campus uses default jupyterhub-singleuser)
    command: start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''
    
    # Keep container running
    stdin_open: true
    tty: true
    
    # Resource limits (adjust for your hardware)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    
    # Healthcheck
    healthcheck:
      test: ["CMD", "python", "-c", "import torch; print('GPU OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: separate service for vLLM API server (inference only)
  vllm-server:
    platform: linux/amd64
    image: llm-spine-parse:dev
    container_name: vllm-server-dev
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    
    volumes:
      - ..:/home/jovyan/llm_train:ro      # Read-only project (includes data/checkpoints)
    
    ports:
      - "8001:8000"      # vLLM API on 8001 (avoid conflict with 8000)
    
    # Override CMD to run vLLM instead of Jupyter
    command: >
      python -m vllm.entrypoints.openai.api_server
      --model Qwen/Qwen2.5-VL-7B-Instruct
      --host 0.0.0.0
      --port 8000
      --trust-remote-code
      --enable-lora
      --max-loras 1
      --max-lora-rank 64
      --lora-modules spine_adapter=/home/jovyan/llm_train/checkpoints/qwen2_5_vl_lora/adapter_model
      --gpu-memory-utilization 0.85
      --max-model-len 2048
      --max-num-seqs 1
      --swap-space 2
      --enforce-eager
    
    depends_on:
      llm-spine-parse:
        condition: service_healthy
    
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
